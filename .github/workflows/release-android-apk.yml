name: Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: 'stable'

      - name: Set up Node (for font fetch)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install font tooling
        run: |
          npm install -g pnpm
          pip install --user fonttools brotli

      - name: Fetch fonts (gitignored TTFs, regenerated in CI)
        run: bash tools/fetch_fonts.sh

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze lib --no-fatal-infos

      - name: Build APK (universal release)
        run: flutter build apk --release

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: ${{ github.ref_name }}
