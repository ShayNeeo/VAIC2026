name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vaic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Embeddings default key-free "local" provider so CI runs offline
      # / zero API keys reproducible.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/vaic"
      INTENT_USE_LLM: "false"
      DEFAULT_LLM: "google"
      GOOGLE_MODEL: "gemma-4-31b-it"
      RAG_PROVIDER: "local"
      KNOWLEDGE_EMBEDDING_PROVIDER: "local"
      RAG_MCP_EMBEDDING_PROVIDER: "local"
      APPROVAL_SECRET: "ci-only-not-a-real-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Optional stack pinned langchain/chromadb versions may conflict
          # with requirements.txt; never let it break CI.
          pip install -r requirements-optional.txt || echo "requirements-optional.txt skipped (conflict)"

      - name: Ensure state dir exists (sqlite-backed tests)
        run: mkdir -p data/state

      - name: Validate config imports cleanly
        run: python -c "from app.config import settings; print('RAG_PROVIDER=', settings.RAG_PROVIDER)"

      - name: Unit tests
        run: python -m pytest -q --ignore=scratch tests/unit

      - name: Contract tests
        run: python -m pytest -q --ignore=scratch tests/contract

      - name: Run guardrail tests (abstention, fail-closed, injection, PII)
        run: python -m pytest tests/guardrails -q

      - name: Run retrieval tests (fail-closed provider failure, quarantine, supersession)
        run: python -m pytest tests/retrieval -q

      - name: Run RAG MCP tests
        run: python -m pytest tests/rag_mcp -q

      - name: Sales-case e2e
        run: python -m pytest -q --ignore=scratch tests/test_sales_cases_e2e.py

      - name: Run remaining E2E tests (V3 golden cases, specialist review closure, controlled retrieval)
        run: python -m pytest tests/e2e -q

      - name: Golden evaluation
        run: python -m app.evaluation.runner --output data/eval/v2/latest_report.json

      - name: Safety/reliability evaluation
        run: python -m app.evaluation.safety_reliability_runner --output data/eval/v2/latest_safety_reliability_report.json

      - name: Benchmark smoke
        run:           python -m benchmarks.run --cache-mode warm --cases BENCH-A01,BENCH-B01,BENCH-D01,BENCH-E01,BENCH-F01 --output-dir benchmarks/results/ci-smoke

      - name: Upload benchmark smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-ci-smoke
          path: benchmarks/results/ci-smoke/
