name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    env:
      # Embeddings default key-free "local" provider so CI runs offline
      # / zero API keys reproducible. Set KNOWLEDGE_EMBEDDING_PROVIDER
      # / RAG_MCP_EMBEDDING_PROVIDER to "gemini" (Google AI Studio key
      # GOOGLE_API_KEY, gemini-embedding-2) or "openai" production semantic
      # recall. Intent extraction stays deterministic (INTENT_USE_LLM=false).
      INTENT_USE_LLM: "false"
      DEFAULT_LLM: "google"
      GOOGLE_MODEL: "gemma-4-31b-it"
      RAG_PROVIDER: "local"
      KNOWLEDGE_EMBEDDING_PROVIDER: "local"
      RAG_MCP_EMBEDDING_PROVIDER: "local"
      APPROVAL_SECRET: "ci-only-not-a-real-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Optional stack pinned langchain/chromadb versions may conflict
          # resolved requirements.txt set; never let it break CI.
          pip install -r requirements-optional.txt || echo "requirements-optional.txt skipped (conflict)"

      - name: Ensure state dir exists (sqlite-backed tests)
        run: mkdir -p data/state

      - name: Validate config imports cleanly
        run: python -c "from app.config import settings; print('RAG_PROVIDER=', settings.RAG_PROVIDER)"

      - name: Unit tests
        run: pytest -q --ignore=scratch -m tests/unit

      - name: Contract tests
        run: pytest -q --ignore=scratch -m tests/contract

      - name: RAG MCP tests
        run: pytest -q --ignore=scratch -m tests/rag_mcp

      - name: Sales-case e2e
        run: pytest -q --ignore=scratch -m tests/test_sales_cases_e2e.py

      - name: Golden evaluation
        run: pytest -q --ignore=scratch -m app.evaluation.runner --output data/eval/v2/latest_report.json

      - name: Safety/reliability evaluation
        run: pytest -q --ignore=scratch -m app.evaluation.safety_reliability_runner --output data/eval/v2/latest_safety_reliability_report.json

      - name: Benchmark smoke
        run: pytest -q --ignore=scratch -m benchmarks.run --cache-mode --cases BENCH-A01,BENCH-B01,BENCH-D01,BENCH-E01,BENCH-F01 --output-dir benchmarks/results/ci-smoke

      - name: Upload benchmark smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-ci-smoke
          path: benchmarks/results/ci-smoke/
