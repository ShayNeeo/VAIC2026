name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Embeddings default to the key-free "local" provider so CI runs offline
      # with zero API keys and is reproducible. Set KNOWLEDGE_EMBEDDING_PROVIDER
      # / RAG_MCP_EMBEDDING_PROVIDER to "gemini" (Google AI Studio key
      # GOOGLE_API_KEY, gemini-embedding-2) or "openai" for production semantic
      # recall. Intent extraction stays deterministic (INTENT_USE_LLM=false).
      INTENT_USE_LLM: "false"
      DEFAULT_LLM: "google"
      GOOGLE_MODEL: "gemma-4-31b-it"
      RAG_PROVIDER: "local"
      KNOWLEDGE_EMBEDDING_PROVIDER: "local"
      RAG_MCP_EMBEDDING_PROVIDER: "local"
      APPROVAL_SECRET: "ci-only-not-a-real-secret"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure state dir exists for sqlite-backed tests
        run: mkdir -p data/state

      - name: Validate config imports cleanly
        run: python -c "from app.config import settings; print('RAG_PROVIDER=', settings.RAG_PROVIDER)"

      - name: Run unit tests
        run: python -m pytest tests/unit -q

      - name: Run contract tests
        run: python -m pytest tests/contract -q

      - name: Run RAG MCP tests
        run: python -m pytest tests/rag_mcp -q

      - name: Run sales-case E2E tests (includes the hero multi-product scenario)
        run: python -m pytest tests/test_sales_cases_e2e.py -q


      - name: Run golden-case evaluation
        run: python -m app.evaluation.runner --output data/eval/v2/latest_report.json

      - name: Run safety/reliability evaluation
        run: python -m app.evaluation.safety_reliability_runner --output data/eval/v2/latest_safety_reliability_report.json

      - name: Run benchmark smoke test (offline, deterministic intent, warm cache, small subset)
        run: |
          python -m benchmarks.run --cache-mode warm \
            --cases BENCH-A01,BENCH-B01,BENCH-D01,BENCH-E01,BENCH-F01 \
            --output-dir benchmarks/results/ci-smoke

      - name: Upload benchmark smoke results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-ci-smoke
          path: benchmarks/results/ci-smoke/
